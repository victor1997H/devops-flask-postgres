name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: devops-flask-postgres
  IMAGE_TAG: 3.0.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir imagen
        run: |
          docker build \
          -t ghcr.io/victor1997h/devops-flask-postgres:${{ env.IMAGE_TAG }} \
          -t ghcr.io/victor1997h/devops-flask-postgres:latest \
          .

      - name: Publicar imagen
        run: |
          docker push ghcr.io/victor1997h/devops-flask-postgres:${{ env.IMAGE_TAG }}
          docker push ghcr.io/victor1997h/devops-flask-postgres:latest